<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
    <style>

        /* Explanation: box-sizing: border-box is an essential CSS rule in professional projects because it stops padding and borders from adding extra pixels to an element's overall dimensions. It ensures that the width and height you write are exactly what renders on the screen, making responsive layout calculations highly predictable. */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        #box-1 {
            /* using pixel unit */
            width: 100px;
            height: 50px;
            margin: 12px;
            padding: 10px;
            color: white;
            background-color: red;
        }

        #box-2 {
            /* using rem unit */
            width: 2rem;
            height: 1.50rem;
            margin: 1.20rem;
            padding: 1.12rem;
            color: white;
            background-color: green;
        }

        #box-3 {
            /* using % percent unit */
            width: 50%;
            height: 30%;
            margin: 5%;
            padding: 3%;
            color: white;
            background-color: blue;
        }
    </style>
</head>

<body>
    <div id="box-1">box 1</div>
    <div id="box-2">box 2</div>
    <div id="box-3">box 3</div>
</body>

</html>
